name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-frontend:
    name: Validate Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  validate-backend:
    name: Validate Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  deploy:
    name: Deploy to Cloudflare Pages
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [validate-frontend, validate-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Deploy to Cloudflare Pages
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          TOKEN="$(printf '%s' "$CF_TOKEN" | tr -d '\n\r')"
          CLOUDFLARE_API_TOKEN="$TOKEN" npx wrangler whoami 2>&1
          CLOUDFLARE_API_TOKEN="$TOKEN" npx wrangler pages deploy dist --project-name=hkn-website --branch production
