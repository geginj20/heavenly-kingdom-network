# This wrangler.toml is for local dev only.
# Production API runs as Cloudflare Pages Functions via functions/api/[[path]].ts
name = "hkn-api-dev"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[vars]
JWT_SECRET = "dev-secret-change-in-production"
SUPABASE_URL = ""
SUPABASE_SERVICE_KEY = ""
